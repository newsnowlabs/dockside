# docker compose up -d sandbox && sleep 2 && docker compose up -d dockside

services:
  dockside:
    container_name: ${DOCKSIDE_NAME:-dockside}
    image: ${DOCKSIDE_IMAGE:-newsnowlabs/dockside:latest}
    restart: unless-stopped
    attach: true
    command: ["--ssl-builtin"]
    ports:
      - "${DOCKSIDE_HTTPS_PORT:-443}:443"
      - "${DOCKSIDE_HTTP_PORT:-80}:80"
      - "1053:53/udp"
    volumes:
      - ~/.dockside:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - dockside-ide:/opt/dockside
      - dockside-hostdata:/opt/dockside/host
    security_opt:
      - apparmor:unconfined
    networks:
      dockside:
        mac_address: "02:00:00:00:00:02"
        gw_priority: 1000
      ds-priv:
        mac_address: "02:00:00:00:00:02"
        gw_priority: 100
      ds-prod:
        mac_address: "02:00:00:00:00:02"
        gw_priority: 101

  sandbox:
    container_name: ${DOCKSIDE_NAME:-dockside-sandbox}
    image: ${DOCKSIDE_IMAGE:-newsnowlabs/dockside:test}
    user: root
    pid: "host"
    privileged: true
    network_mode: "none"          # No network of its own — uses nsenter to enter host netns
    restart: unless-stopped
    attach: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.dockside/sandbox:/etc/dockside
    entrypoint:
      - nsenter
      - --net=/proc/1/ns/net
      - --
      - python3
      - /home/dockside/dockside/install/usr/local/lib/dockside/dockside-network-firewall.py
      - --daemon

volumes:
  dockside-ide:
  dockside-hostdata:

networks:
  dockside:
    external: true
  ds-priv:
    external: true
  ds-prod:
    external: true
