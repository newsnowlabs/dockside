services:
  dockside:
    container_name: ${DOCKSIDE_NAME:-dockside}
    image: ${DOCKSIDE_IMAGE:-newsnowlabs/dockside:latest}
    restart: unless-stopped
    attach: false
    command: ["--ssl-builtin"]
    ports:
      - "${DOCKSIDE_HTTPS_PORT:-443}:443"
      - "${DOCKSIDE_HTTP_PORT:-80}:80"
      - "53:53/udp"
    volumes:
      - ~/.dockside:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ide:/opt/dockside
      - hostkeys:/opt/dockside/host
    security_opt:
      - apparmor:unconfined
    network_mode: "bridge"

volumes:
  ide:
  hostkeys:
