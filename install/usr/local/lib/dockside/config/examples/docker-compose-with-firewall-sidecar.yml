services:
  dockside:
    container_name: ${DOCKSIDE_NAME:-dockside}
    image: ${DOCKSIDE_IMAGE:-newsnowlabs/dockside:latest}
    restart: unless-stopped
    attach: false
    command: ["--ssl-letsencrypt"]
    ports:
      - "${DOCKSIDE_HTTPS_PORT:-443}:443"
      - "${DOCKSIDE_HTTP_PORT:-80}:80"
      - "1053:53/udp"
    volumes:
      - /home/newsnow/dockside/data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ide:/opt/dockside
      - dockside-hostdata:/opt/dockside/host
    security_opt:
      - apparmor:unconfined
    networks:
      dockside:
        mac_address: "02:00:00:00:00:02"
        ipv4_address: 172.20.0.2
        gw_priority: 1000
      ds-priv:
        mac_address: "02:00:00:00:00:02"
        ipv4_address: 172.20.1.2
        gw_priority: 100
      ds-clone:
        mac_address: "02:00:00:00:00:02"
        ipv4_address: 172.20.2.2
        gw_priority: 101
      ds-prod:
        mac_address: "02:00:00:00:00:02"
        ipv4_address: 172.20.3.2
        gw_priority: 102

  dockside-iptables:
    image: ${DOCKSIDE_IMAGE:-newsnowlabs/dockside:latest}
    pid: "host"
    privileged: true
    network_mode: "none"          # No network of its own — uses nsenter to enter host netns
    restart: unless-stopped
    attach: false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint:
      - nsenter
      - --net=/proc/1/ns/net
      - --
      - python3
      - /usr/local/lib/dockside/dockside-network-firewall.py
      - --daemon

volumes:
  ide:
  dockside-hostdata:
    external: true

networks:
  dockside:
    external: true
  ds-priv:
    external: true
  ds-prod:
    external: true
  ds-clone:
    external: true
